<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğretmen - Quiz Yönetimi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <link rel="stylesheet" href="css/session.css">
</head>
<body>
    <div class="container">
        <div class="card">
           <div id="createSessionSection">
                <h1>🎓 Öğretmen Paneli</h1>
                <h2>Quiz Oturumunu Başlat</h2>
                <p style="margin-bottom: 20px; color: #666;">Seçili quiz için yeni bir oturum oluşturulacak.</p>
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button onclick="createSession()" style="flex: 2;">
                        Session Oluştur ve Başlat
                    </button>
                    <button onclick="goToHome()" style="flex: 1; background: #f5576c; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <span style="font-size: 20px;">🏠</span> Ana Sayfa
                    </button>
                </div>
            </div>

            <!-- Bekleme Ekranı -->
            <div id="waitingSection" class="hidden">
                <div class="pin-display">
                    <h2>Öğrenciler Katılsın</h2>
                    <div>Öğrenciler bu PIN kodunu girsin:</div>
                    <div class="pin-code" id="pinCode">------</div>
                    <div>Quiz: <span id="quizTitle"></span></div>
                    <div>Toplam Soru: <span id="totalQuestions">0</span></div>
                </div>

                <h3>Katılımcılar (<span id="participantCount">0</span>)</h3>
                <div class="participants" id="participantsList"></div>

                <button onclick="startSession()" id="startButton" style="width: 100%; margin-top: 20px;">
                    Oyunu Başlat
                </button>
            </div>

            <!-- Oyun Ekranı -->
            <div id="gameSection" class="hidden">
                <div class="current-question" id="currentQuestionDisplay"></div>

                <h3>Anlık Sıralama</h3>
                <div class="leaderboard" id="liveLeaderboard"></div>

                <button onclick="nextQuestion()" id="nextButton" style="width: 100%; margin-top: 20px;">
                    Sonraki Soru
                </button>
            </div>
            <div id="resultsSection" class="hidden">
                <h2>🏆 Final Sonuçları</h2>
                <div class="leaderboard" id="finalLeaderboard"></div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="location.reload()" style="flex: 1;">Yeni Session Başlat</button>
                    <button onclick="goToHome()" style="flex: 1; background: #f5576c; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <span style="font-size: 20px;">🏠</span> Ana Sayfa
                    </button>
                </div>
            </div>

            <div id="status"></div>
        </div>
    </div>

    <script>
        let connection;
        let currentPinCode;
        let participants = [];

        // SignalR Bağlantısı
        async function initSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl("/QuizHub")
                .withAutomaticReconnect([1000, 1000, 20000, 3000, 5000, 1000, 100, 10000])
                .build();
            connection.onreconnecting(error => {
                console.assert(connection.state === signalR.HubConnectionState.Reconnecting);
                showStatus(`Yeniden Bağlanılıyor ... `, 'warning');
                });
            connection.onreconnected(connecitonid => {
                console.assert(connection.state === signalR.HubConnectionState.Connected);
                showStatus(`Yeniden Bağlanıldı `, 'success');
                });
            // Event Listeners
            connection.on("UserJoined", (data) => {
                const joinedUser = data.username || data.Username; 
                if (joinedUser) {
                    participants.push(joinedUser);
                    showStatus(`${joinedUser} katıldı!`, 'success');
                    updateParticipantsList(participants.length);
                }
                else
                    console.log("Insertion Failed");
            });
            connection.on("UpdateLeaderboard", (leaderboard) => {
                updateLeaderboard(leaderboard); // Mevcut fonksiyonunuzu çağırıyoruz
            });

            connection.on("SetTeacherToken",(token)=>{
                localStorage.setItem("teacherToken",token);
            });
            connection.on("SetTeacherId",(id)=>{
                localStorage.setItem("teacherId",id);
            });
            connection.on("SetPinCode", (code) => {
                currentPinCode = code; // Bu satırı ekle
                document.getElementById('pinCode').innerText = code;
            });
            connection.on("SetSessionId", (sessionId) => {
                localStorage.setItem("sessionId",sessionId);
            });
            connection.on("SessionStarted", (message) => {
                showStatus(message, 'success');
                document.getElementById('waitingSection').classList.add('hidden');
                document.getElementById('gameSection').classList.remove('hidden');
            });

            connection.on("SendQuestion", (data) => {
                displayQuestion(data);
                startTeacherTimer(data.TimeLimit || data.time);
            });

            connection.on("ShowResults", (data) => {
                displayResults(data);
            });

            connection.on("EndSession", (leaderboard) => {
                showFinalResults(leaderboard);
            });

            try {
                await connection.start();
                showStatus("Bağlantı Başarılı",'success')
            } catch (err) {
                showStatus("Bağlantı Hatası ",'error');
            }
        }
        // Yardımcı fonksiyon: Listeye yeni bir isim eklemek için
            function renderNewParticipant(data) {
                const listContainer = document.getElementById('participant-list');
                if (listContainer) {
                    const userElement = document.createElement('div');
                    userElement.id = `user-${data.connectionId}`; // ConnectionId'yi silme işlemleri için kullanabilirsin
                    userElement.className = 'participant-item';
                    userElement.textContent = data.username || data.Username;
                    listContainer.appendChild(userElement);
                }
            }

        async function createSession() {
        const teacherId = localStorage.getItem("userid") || localStorage.getItem("teacherId");
        const quizId = localStorage.getItem("selectedQuizId") || localStorage.getItem("quizId");

        if (!teacherId || !quizId) {
            showStatus('Hata: Öğretmen ID veya Quiz ID bulunamadı. Lütfen listeye geri dönüp tekrar deneyin.', 'error');
            return;
        }

        try {
            await connection.invoke("CreateSession", teacherId, quizId);
            
            document.getElementById('createSessionSection').classList.add('hidden');
            document.getElementById('waitingSection').classList.remove('hidden');
            
            showStatus('Session başarıyla oluşturuldu!', 'success');
        } catch (err) {
            showStatus('Hata: Lütfen Sayfayı Yenileyip Tekrar Deneyiniz ' + err, 'error');
        }
    }

    async function startSession() {
        const token = localStorage.getItem("teacherToken");
        const teacherId = localStorage.getItem("teacherId") || localStorage.getItem("userid");
        const sessionId = localStorage.getItem("SessionId") || localStorage.getItem("sessionId");

        if (participants.length === 0) {
            showStatus('En az 1 katılımcı gerekli!', 'error');
            return;
        }
        try {
            await connection.invoke("StartSession", sessionId, teacherId, token);
        } catch (err) {
            showStatus('Hata: ' + err, 'error');
        }
    }

        // Sonraki Soru
        async function nextQuestion() {
                const token = localStorage.getItem("teacherToken");
                const teacherId = localStorage.getItem("teacherId");
                const sessionId = localStorage.getItem("sessionId");
                
                // Butonu devre dışı bırak
                const nextButton = document.getElementById('nextButton');
                nextButton.disabled = true;
                nextButton.style.opacity = '0.5';
                nextButton.innerHTML = '⏳ Soru gönderiliyor...';
                
                try {
                    await connection.invoke("NextQuestion", sessionId, teacherId, token);
                } catch (err) {
                    showStatus('Hata: ' + err, 'error');
                    // Hata durumunda butonu tekrar aktif et
                    nextButton.disabled = false;
                    nextButton.style.opacity = '1';
                    nextButton.innerHTML = 'Sonraki Soru';
                }
            }

           let teacherTimerInterval;

            function startTeacherTimer(seconds) {
                    if (teacherTimerInterval) clearInterval(teacherTimerInterval);
                    
                    let timeLeft = seconds;
                    const timerDisplay = document.getElementById('teacherTimerDisplay');
                    const nextButton = document.getElementById('nextButton');
                    
                    // Timer başladığında buton devre dışı
                    if (nextButton) {
                        nextButton.disabled = true;
                        nextButton.style.opacity = '0.5';
                        nextButton.innerHTML = `⏱️ ${timeLeft} saniye kaldı...`;
                    }
                    
                    teacherTimerInterval = setInterval(() => {
                        timeLeft--;
                        
                        if (timerDisplay) {
                            timerDisplay.innerText = timeLeft;
                        }
                        
                        // Buton metnini güncelle
                        if (nextButton && timeLeft > 0) {
                            nextButton.innerHTML = `⏱️ ${timeLeft} saniye kaldı...`;
                        }
                        
                        if (timeLeft <= 0) {
                            clearInterval(teacherTimerInterval);
                            
                            // Süre bittiğinde butonu aktif et
                            if (nextButton) {
                                nextButton.disabled = false;
                                nextButton.style.opacity = '1';
                                nextButton.innerHTML = '➡️ Sonraki Soru';
                            }
                            
                            // Timer display'i sıfırla
                            if (timerDisplay) {
                                timerDisplay.innerText = '0';
                            }
                        }
                    }, 1000);
                }

            function displayQuestion(data) {
    // Yeni soru geldiğinde butonu hazırla
    const nextButton = document.getElementById('nextButton');
    if (nextButton) {
        nextButton.disabled = true;
        nextButton.style.opacity = '0.5';
        nextButton.innerHTML = `⏱️ ${data.TimeLimit || data.time} saniye kaldı...`;
    }
    
    const questionHtml = `
        <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span style="background: #667eea; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold;">
                Soru ${data.QuestionNumber || data.order} / ${data.TotalQuestions || '?'}
            </span>
            <span id="teacherTimerDisplay" style="background: #f5576c; color: white; padding: 10px 20px; border-radius: 10px; font-size: 24px; font-weight: bold;">
                ${data.TimeLimit || data.time}
            </span>
        </div>
        <div class="question-text">${data.QuestionText || data.text}</div>

        ${(data.ImageUrl) ? `<img src="${data.ImageUrl}" style="max-width: 100%; border-radius: 8px; margin-bottom: 15px;">` : ''}

        <div class="options">
            ${(data.Options || data.answers).map((opt, idx) => {
                const text = typeof opt === 'string' ? opt : opt.text;
                return `
                    <div class="option" style="cursor: default; opacity: 0.9;">
                        <strong>${String.fromCharCode(65 + idx)}:</strong> ${text}
                    </div>
                `;
            }).join('')}
        </div>

        ${data.Explanation ? `
            <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-left: 5px solid #ffecb5; color: #856404; border-radius: 8px;">
                <strong>Not (Öğretmen Görür):</strong> ${data.Explanation}
            </div>
        ` : ''}
    `;
    
    document.getElementById('currentQuestionDisplay').innerHTML = questionHtml;
    
    // Timer'ı başlat
    if (data.TimeLimit || data.time) {
        startTeacherTimer(data.TimeLimit || data.time);
    }
}

        // Sonuçları Göster
        function displayResults(data) {
            const questionDiv = document.getElementById('currentQuestionDisplay');
            const options = questionDiv.querySelectorAll('.option');

            options.forEach(opt => {
                if (opt.textContent.includes(data.CorrectAnswer)) {
                    opt.classList.add('correct');
                }
            });

            if (data.Explanation) {
                questionDiv.innerHTML += `
                    <div style="margin-top: 20px; padding: 15px; background: #d4edda; border-radius: 8px;">
                        <strong>Açıklama:</strong> ${data.Explanation}
                    </div>
                `;
            }

            updateLeaderboard(data.Leaderboard);
        }

        function updateLeaderboard(leaderboard) {
            const html = leaderboard.map((user, index) => {
                const name = user.userName || user.Username || "İsimsiz";
                const score = user.score !== undefined ? user.score : (user.Score || 0);

                return `
                    <div class="leaderboard-item">
                        <div>
                            <span style="font-size: 24px; margin-right: 10px;">
                                ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1}
                            </span>
                            <strong>${name}</strong>
                        </div>
                        <div style="font-size: 24px; font-weight: bold; color: #667eea;">
                            ${score} puan
                        </div>
                    </div>
                `;
            }).join('');

            const leaderboardDiv = document.getElementById('liveLeaderboard');
            if (leaderboardDiv) {
                leaderboardDiv.innerHTML = html;
            }
        }
        function goToHome() {
            localStorage.removeItem("selectedQuizId");
            localStorage.removeItem("quizId");
            localStorage.removeItem("SessionId");
            window.location.href = 'ogretmen.html'; 
}
        function showFinalResults(leaderboard) {
            document.getElementById('gameSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');

            const html = leaderboard.map((user, index) => `
                <div class="leaderboard-item">
                    <div>
                        <span style="font-size: 32px; margin-right: 10px;">
                            ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1}
                        </span>
                        <strong style="font-size: 20px;">${user.userName}</strong>
                    </div>
                    <div style="font-size: 28px; font-weight: bold; color: #667eea;">
                        ${user.score} puan
                    </div>
                </div>
            `).join('');

            document.getElementById('finalLeaderboard').innerHTML = html;

            // Kazananı duyur (Listenin ilk elemanı)
            if (leaderboard.length > 0) {
                showStatus(`🎉 Quiz Tamamlandı! Kazanan: ${leaderboard[0].userName}`, 'success');
            }
        }

        // Katılımcı Listesi Güncelle
        function updateParticipantsList(count) {
            document.getElementById('participantCount').textContent = count;
            const html = participants.map(p => `
                <div class="participant">
                    <div style="font-size: 40px;">👤</div>
                    <div style="margin-top: 8px; font-weight: 600;">${p}</div>
                </div>
            `).join('');
            document.getElementById('participantsList').innerHTML = html;
        }

        // Durum Mesajı
       function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = 'status'; 
            }, 5000);
        }

        // Sayfa yüklendiğinde
        initSignalR();
    </script>
</body>
</html>
