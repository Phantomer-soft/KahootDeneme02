version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__SqlCon=server=db;port=3306;database=QuizDb;user=root;password=sero88256.!;  
      - ASPNETCORE_ENVIRONMENT=Production
    restart: always

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: QuizDb
      MYSQL_ROOT_PASSWORD: sero88256.!
    volumes:
      - mysqldata:/var/lib/mysql
    restart: always
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    restart: always
    
volumes:
  mysqldata:
  